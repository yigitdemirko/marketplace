services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  config-server:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./infrastructure/config-server/target:/app
    command: java -jar config-server-1.0.0-SNAPSHOT.jar
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-server:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./infrastructure/discovery-server/target:/app
    command: java -jar discovery-server-1.0.0-SNAPSHOT.jar
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./infrastructure/api-gateway/target:/app
    command: java -jar api-gateway-1.0.0-SNAPSHOT.jar
    ports:
      - "8080:8080"
    environment:
      EUREKA_HOST: discovery-server
    depends_on:
      discovery-server:
        condition: service_healthy

  user-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/user-service/target:/app
    command: java -jar user-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_HOST: discovery-server
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  search-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/search-service/target:/app
    command: java -jar search-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8083:8083"
    environment:
      ELASTICSEARCH_HOST: elasticsearch
      EUREKA_HOST: discovery-server
    depends_on:
      elasticsearch:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  product-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/product-service/target:/app
    command: java -jar product-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8082:8082"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      EUREKA_HOST: discovery-server
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

volumes:
  postgres-data:
  mongo-data:
  elasticsearch-data: