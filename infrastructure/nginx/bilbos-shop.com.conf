server {
    listen 80;
    server_name bilbos-shop.com www.bilbos-shop.com;
    return 301 https://bilbos-shop.com$request_uri;
}

server {
    listen 443 ssl;
    server_name bilbos-shop.com www.bilbos-shop.com;

    ssl_certificate     /etc/letsencrypt/live/bilbos-shop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bilbos-shop.com/privkey.pem;

    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    server_name seller.bilbos-shop.com;
    return 301 https://seller.bilbos-shop.com$request_uri;
}

server {
    listen 443 ssl;
    server_name seller.bilbos-shop.com;

    ssl_certificate     /etc/letsencrypt/live/seller.bilbos-shop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seller.bilbos-shop.com/privkey.pem;

    root /var/www/html;
    index seller.html;

    location / {
        try_files $uri $uri/ /seller.html;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
