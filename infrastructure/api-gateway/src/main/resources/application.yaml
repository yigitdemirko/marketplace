server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**
            - id: user-service-users
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
            - id: user-service-profile
              uri: lb://user-service
              predicates:
                - Path=/api/v1/profile/**
            - id: catalog-service
              uri: lb://catalog-service
              predicates:
                - Path=/api/v1/products/**
            - id: search-service
              uri: lb://search-service
              predicates:
                - Path=/api/v1/search/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**
            - id: feed-ingestion-service
              uri: lb://feed-ingestion-service
              predicates:
                - Path=/api/v1/feeds/**
            - id: inventory-service
              uri: lb://inventory-service
              predicates:
                - Path=/api/v1/inventory/**
            - id: notification-service
              uri: lb://notification-service
              predicates:
                - Path=/api/v1/notifications/**
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/api-docs/user-service
              filters:
                - RewritePath=/api-docs/user-service, /v3/api-docs
            - id: catalog-service-docs
              uri: lb://catalog-service
              predicates:
                - Path=/api-docs/catalog-service
              filters:
                - RewritePath=/api-docs/catalog-service, /v3/api-docs
            - id: order-service-docs
              uri: lb://order-service
              predicates:
                - Path=/api-docs/order-service
              filters:
                - RewritePath=/api-docs/order-service, /v3/api-docs
            - id: payment-service-docs
              uri: lb://payment-service
              predicates:
                - Path=/api-docs/payment-service
              filters:
                - RewritePath=/api-docs/payment-service, /v3/api-docs
            - id: search-service-docs
              uri: lb://search-service
              predicates:
                - Path=/api-docs/search-service
              filters:
                - RewritePath=/api-docs/search-service, /v3/api-docs
            - id: feed-ingestion-service-docs
              uri: lb://feed-ingestion-service
              predicates:
                - Path=/api-docs/feed-ingestion-service
              filters:
                - RewritePath=/api-docs/feed-ingestion-service, /v3/api-docs
            - id: inventory-service-docs
              uri: lb://inventory-service
              predicates:
                - Path=/api-docs/inventory-service
              filters:
                - RewritePath=/api-docs/inventory-service, /v3/api-docs
            - id: notification-service-docs
              uri: lb://notification-service
              predicates:
                - Path=/api-docs/notification-service
              filters:
                - RewritePath=/api-docs/notification-service, /v3/api-docs
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "${FRONTEND_URL}"
                  - "${SELLER_URL}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /api-docs/user-service
      - name: catalog-service
        url: /api-docs/catalog-service
      - name: order-service
        url: /api-docs/order-service
      - name: payment-service
        url: /api-docs/payment-service
      - name: search-service
        url: /api-docs/search-service
      - name: feed-ingestion-service
        url: /api-docs/feed-ingestion-service
      - name: inventory-service
        url: /api-docs/inventory-service
      - name: notification-service
        url: /api-docs/notification-service
    server-url: ${API_SERVER_URL:http://localhost:8080}

jwt:
  secret: ${JWT_SECRET}

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
---
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces

logging:
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
