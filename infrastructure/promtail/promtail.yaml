server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: marketplace-services
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      # Only collect logs from marketplace business services
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: (user-service|catalog-service|inventory-service|order-service|payment-service|notification-service|search-service|feed-ingestion-service|api-gateway)
        action: keep
    pipeline_stages:
      - json:
          expressions:
            level: level
            message: message
            service: service
            traceId: traceId
            spanId: spanId
            logger: logger
      - labels:
          level:
          service:
          traceId:
      - output:
          source: message
