name: CI

on:
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    if: contains(github.event.pull_request.labels.*.name, 'backend')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install parent POM and common-lib
        run: |
          mvn install -N -DskipTests -B
          mvn install -pl shared/common-lib -DskipTests -B

      - name: Run unit tests
        run: mvn test -pl services/user-service,services/catalog-service,services/search-service,services/order-service,services/payment-service,services/inventory-service,services/notification-service,services/basket-service -Dgroups=unit

  integration-tests:
    if: contains(github.event.pull_request.labels.*.name, 'backend')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install parent POM and common-lib
        run: |
          mvn install -N -DskipTests -B
          mvn install -pl shared/common-lib -DskipTests -B

      - name: Run integration tests
        run: mvn test -pl services/user-service,services/catalog-service,services/inventory-service,services/notification-service,services/basket-service -Dgroups=integration

  coverage-check:
    if: contains(github.event.pull_request.labels.*.name, 'backend')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install parent POM and common-lib
        run: |
          mvn install -N -DskipTests -B
          mvn install -pl shared/common-lib -DskipTests -B

      - name: Run all tests + jacoco check
        run: mvn verify -pl services/user-service,services/catalog-service,services/search-service,services/order-service,services/payment-service,services/inventory-service,services/notification-service,services/feed-ingestion-service,services/basket-service -B