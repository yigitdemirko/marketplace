services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./infrastructure/config-server/target:/app
    command: java -jar config-server-1.0.0-SNAPSHOT.jar
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-server:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./infrastructure/discovery-server/target:/app
    command: java -jar discovery-server-1.0.0-SNAPSHOT.jar
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./infrastructure/api-gateway/target:/app
    command: java -jar api-gateway-1.0.0-SNAPSHOT.jar
    environment:
      EUREKA_HOST: discovery-server
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy

  user-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/user-service/target:/app
    command: java -jar user-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_HOST: discovery-server
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data: