name: Notify Slack
description: Post a deploy result to Slack via incoming webhook.

inputs:
  service:
    description: Service name being deployed
    required: true
  status:
    description: Job status (success, failure, cancelled) — pass ${{ job.status }}
    required: true
  webhook-url:
    description: Slack incoming webhook URL
    required: true

runs:
  using: composite
  steps:
    - name: Send to Slack
      shell: bash
      env:
        SERVICE: ${{ inputs.service }}
        STATUS: ${{ inputs.status }}
        WEBHOOK: ${{ inputs.webhook-url }}
        COMMIT_SHA: ${{ github.sha }}
        COMMIT_MSG: ${{ github.event.head_commit.message }}
        ACTOR: ${{ github.actor }}
        REPO: ${{ github.repository }}
        REF: ${{ github.ref_name }}
        RUN_ID: ${{ github.run_id }}
      run: |
        case "$STATUS" in
          success)   ICON="✅" ;;
          failure)   ICON="❌" ;;
          cancelled) ICON="⚪" ;;
          *)         ICON="❓" ;;
        esac
        SHORT_SHA="${COMMIT_SHA:0:7}"
        FIRST_LINE=$(printf '%s\n' "$COMMIT_MSG" | head -n1)
        [ -z "$FIRST_LINE" ] && FIRST_LINE="(manual deploy)"
        RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
        TEXT="${ICON} *${SERVICE}* — ${STATUS}
        • \`${SHORT_SHA}\` ${FIRST_LINE}
        • branch \`${REF}\` · by @${ACTOR}
        • <${RUN_URL}|view run>"
        PAYLOAD=$(jq -nc --arg text "$TEXT" '{text: $text}')
        curl -sS -X POST -H 'Content-Type: application/json' --data "$PAYLOAD" "$WEBHOOK"
