# Cloudflare SSL terminate ediyor — nginx sadece HTTP (port 80) dinler.
# Bu dosya referans amaçlıdır; sunucudaki /etc/nginx/sites-enabled/myapp elle yönetilir.

server {
    listen 80;
    server_name bilbos-shop.com www.bilbos-shop.com;

    root /var/www/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    server_name api.bilbos-shop.com;

    location / {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name seller.bilbos-shop.com;

    root /var/www/html;
    index seller.html;

    location / {
        try_files $uri $uri/ /seller.html;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|ico|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 80;
    server_name grafana.bilbos-shop.com;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
