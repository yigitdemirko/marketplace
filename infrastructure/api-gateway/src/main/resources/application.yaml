server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/auth/**
            - id: product-service
              uri: lb://product-service
              predicates:
                - Path=/api/v1/products/**
            - id: search-service
              uri: lb://search-service
              predicates:
                - Path=/api/v1/search/**
            - id: order-service
              uri: lb://order-service
              predicates:
                - Path=/api/v1/orders/**
            - id: payment-service
              uri: lb://payment-service
              predicates:
                - Path=/api/v1/payments/**
            - id: user-service-docs
              uri: lb://user-service
              predicates:
                - Path=/api-docs/user-service
              filters:
                - RewritePath=/api-docs/user-service, /v3/api-docs
            - id: product-service-docs
              uri: lb://product-service
              predicates:
                - Path=/api-docs/product-service
              filters:
                - RewritePath=/api-docs/product-service, /v3/api-docs
            - id: order-service-docs
              uri: lb://order-service
              predicates:
                - Path=/api-docs/order-service
              filters:
                - RewritePath=/api-docs/order-service, /v3/api-docs
            - id: payment-service-docs
              uri: lb://payment-service
              predicates:
                - Path=/api-docs/payment-service
              filters:
                - RewritePath=/api-docs/payment-service, /v3/api-docs
            - id: search-service-docs
              uri: lb://search-service
              predicates:
                - Path=/api-docs/search-service
              filters:
                - RewritePath=/api-docs/search-service, /v3/api-docs
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "${FRONTEND_URL}"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /api-docs/user-service
      - name: product-service
        url: /api-docs/product-service
      - name: order-service
        url: /api-docs/order-service
      - name: payment-service
        url: /api-docs/payment-service
      - name: search-service
        url: /api-docs/search-service

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always