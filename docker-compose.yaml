services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10


  loki:
    image: grafana/loki:3.2.0
    command: ["-config.file=/etc/loki/loki.yaml"]
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki.yaml:/etc/loki/loki.yaml
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  promtail:
    image: grafana/promtail:3.2.0
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    volumes:
      - ./infrastructure/promtail/promtail.yaml:/etc/promtail/promtail.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      loki:
        condition: service_healthy

  tempo:
    image: grafana/tempo:2.6.1
    user: root
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./infrastructure/tempo/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo-data:/tmp/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-remote-write-receiver"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3001:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_FEATURE_TOGGLES_ENABLE: "traceqlEditor"
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
      - loki

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_HEAP_OPTS: "-Xmx128m -Xms64m"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  config-server:
    image: ghcr.io/yigitdemirko/marketplace/config-server:latest
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  discovery-server:
    image: ghcr.io/yigitdemirko/marketplace/discovery-server:latest
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  api-gateway:
    image: ghcr.io/yigitdemirko/marketplace/api-gateway:latest
    ports:
      - "8080:8080"
    environment:
      EUREKA_HOST: discovery-server
      FRONTEND_URL: ${FRONTEND_URL}
      SELLER_URL: ${SELLER_URL}
      API_SERVER_URL: ${API_SERVER_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      discovery-server:
        condition: service_healthy

  user-service:
    image: ghcr.io/yigitdemirko/marketplace/user-service:latest
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: "true"
      EUREKA_HOST: discovery-server
      API_SERVER_URL: ${API_SERVER_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  catalog-service:
    image: ghcr.io/yigitdemirko/marketplace/catalog-service:latest
    ports:
      - "8082:8082"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      S3_URL: ${S3_URL}
      BUCKET_NAME: ${BUCKET_NAME}
      ACCESS_KEY_ID: ${ACCESS_KEY_ID}
      SECRET_ACCESS_KEY: ${SECRET_ACCESS_KEY}
      REGION: ${REGION}
      API_SERVER_URL: ${API_SERVER_URL}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  search-service:
    image: ghcr.io/yigitdemirko/marketplace/search-service:latest
    ports:
      - "8083:8083"
    environment:
      ELASTICSEARCH_HOST: elasticsearch
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      API_SERVER_URL: ${API_SERVER_URL}
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  order-service:
    image: ghcr.io/yigitdemirko/marketplace/order-service:latest
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      API_SERVER_URL: ${API_SERVER_URL}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  payment-service:
    image: ghcr.io/yigitdemirko/marketplace/payment-service:latest
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      IYZICO_API_KEY: ${IYZICO_API_KEY}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL}
      API_SERVER_URL: ${API_SERVER_URL}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  notification-service:
    image: ghcr.io/yigitdemirko/marketplace/notification-service:latest
    ports:
      - "8086:8086"
    environment:
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      API_SERVER_URL: ${API_SERVER_URL}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  feed-ingestion-service:
    image: ghcr.io/yigitdemirko/marketplace/feed-ingestion-service:latest
    ports:
      - "8087:8087"
    environment:
      DB_HOST: postgres
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      EUREKA_HOST: discovery-server
      API_SERVER_URL: ${API_SERVER_URL}
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  inventory-service:
    image: ghcr.io/yigitdemirko/marketplace/inventory-service:latest
    ports:
      - "8088:8088"
    environment:
      MONGODB_HOST: mongodb
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      API_SERVER_URL: ${API_SERVER_URL}
      PRODUCT_MONGO_URI: mongodb://mongodb:27017/product_db
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

volumes:
  postgres-data:
  mongo-data:
  elasticsearch-data:
  tempo-data:
  prometheus-data:
  grafana-data:
  loki-data: