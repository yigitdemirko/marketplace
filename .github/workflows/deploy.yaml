  deploy-order-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.order-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and push image
        run: |
          mvn compile jib:build -pl services/order-service --also-make \
            -Djib.to.image=ghcr.io/yigitdemirko/marketplace/order-service:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GHCR_TOKEN }}
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
