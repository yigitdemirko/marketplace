services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: [ "CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  config-server:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./infrastructure/config-server/target:/app
    command: java -jar config-server-1.0.0-SNAPSHOT.jar
    ports:
      - "8888:8888"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  discovery-server:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./infrastructure/discovery-server/target:/app
    command: java -jar discovery-server-1.0.0-SNAPSHOT.jar
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./infrastructure/api-gateway/target:/app
    command: java -jar api-gateway-1.0.0-SNAPSHOT.jar
    ports:
      - "8080:8080"
    environment:
      EUREKA_HOST: discovery-server
    depends_on:
      discovery-server:
        condition: service_healthy

  user-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/user-service/target:/app
    command: java -jar user-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_HOST: discovery-server
    depends_on:
      postgres:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  search-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/search-service/target:/app
    command: java -jar search-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8083:8083"
    environment:
      ELASTICSEARCH_HOST: elasticsearch
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  product-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/product-service/target:/app
    command: java -jar product-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8082:8082"
    environment:
      MONGODB_HOST: mongodb
      REDIS_HOST: redis
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  order-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/order-service/target:/app
    command: java -jar order-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8084:8084"
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  payment-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/payment-service/target:/app
    command: java -jar payment-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8085:8085"
    environment:
      DB_HOST: postgres
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      IYZICO_API_KEY: ${IYZICO_API_KEY}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

  notification-service:
    image: eclipse-temurin:21-jre-alpine
    working_dir: /app
    volumes:
      - ./services/notification-service/target:/app
    command: java -jar notification-service-1.0.0-SNAPSHOT.jar
    ports:
      - "8086:8086"
    environment:
      EUREKA_HOST: discovery-server
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MAIL_HOST: smtp.gmail.com
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy

volumes:
  postgres-data:
  mongo-data:
  elasticsearch-data: