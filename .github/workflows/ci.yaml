name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'pom.xml'

permissions:
  contents: write

jobs:
  unit-tests:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'backend')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install parent POM and common-lib
        run: |
          mvn install -N -DskipTests -B
          mvn install -pl shared/common-lib -DskipTests -B

      - name: Run unit tests
        run: mvn test -pl services/user-service,services/catalog-service,services/search-service,services/order-service,services/payment-service,services/inventory-service,services/notification-service,services/basket-service -Dgroups=unit

  integration-tests:
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'backend')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install parent POM and common-lib
        run: |
          mvn install -N -DskipTests -B
          mvn install -pl shared/common-lib -DskipTests -B

      - name: Run integration tests
        run: mvn test -pl services/user-service,services/catalog-service,services/inventory-service,services/notification-service,services/basket-service -Dgroups=integration

  coverage:
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'backend'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Install parent POM and common-lib
        run: |
          mvn install -N -DskipTests -B
          mvn install -pl shared/common-lib -DskipTests -B

      - name: Run all tests + jacoco check + aggregate report
        run: mvn verify -pl services/user-service,services/catalog-service,services/search-service,services/order-service,services/payment-service,services/inventory-service,services/notification-service,services/feed-ingestion-service,services/basket-service,coverage-aggregate -am -B

      - name: Generate coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cicirello/jacoco-badge-generator@v2
        with:
          jacoco-csv-file: coverage-aggregate/target/site/jacoco-aggregate/jacoco.csv
          badges-directory: .github/badges
          generate-coverage-badge: true
          coverage-badge-filename: jacoco.svg

      - name: Commit badge if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [[ -n "$(git status --porcelain .github/badges/)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges/
            git commit -m "chore: update jacoco coverage badge [skip ci]"
            git push
          fi