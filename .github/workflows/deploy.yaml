name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - config-server
          - discovery-server
          - api-gateway
          - user-service
          - catalog-service
          - search-service
          - order-service
          - payment-service
          - notification-service
          - feed-ingestion-service
          - inventory-service
          - basket-service
          - frontend
          - all

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull origin main

  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      config-server: ${{ steps.changes.outputs.config-server }}
      discovery-server: ${{ steps.changes.outputs.discovery-server }}
      user-service: ${{ steps.changes.outputs.user-service }}
      catalog-service: ${{ steps.changes.outputs.catalog-service }}
      search-service: ${{ steps.changes.outputs.search-service }}
      order-service: ${{ steps.changes.outputs.order-service }}
      payment-service: ${{ steps.changes.outputs.payment-service }}
      notification-service: ${{ steps.changes.outputs.notification-service }}
      feed-ingestion-service: ${{ steps.changes.outputs.feed-ingestion-service }}
      inventory-service: ${{ steps.changes.outputs.inventory-service }}
      basket-service: ${{ steps.changes.outputs.basket-service }}
      api-gateway: ${{ steps.changes.outputs.api-gateway }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            config-server:
              - 'infrastructure/config-server/**'
            discovery-server:
              - 'infrastructure/discovery-server/**'
            user-service:
              - 'services/user-service/**'
              - 'shared/common-lib/**'
            catalog-service:
              - 'services/catalog-service/**'
              - 'shared/common-lib/**'
            search-service:
              - 'services/search-service/**'
            order-service:
              - 'services/order-service/**'
              - 'shared/common-lib/**'
            payment-service:
              - 'services/payment-service/**'
              - 'shared/common-lib/**'
            notification-service:
              - 'services/notification-service/**'
              - 'shared/common-lib/**'
            feed-ingestion-service:
              - 'services/feed-ingestion-service/**'
              - 'shared/common-lib/**'
            inventory-service:
              - 'services/inventory-service/**'
              - 'shared/common-lib/**'
            basket-service:
              - 'services/basket-service/**'
              - 'shared/common-lib/**'
            api-gateway:
              - 'infrastructure/api-gateway/**'
            frontend:
              - 'frontend/**'

  deploy-config-server:
    needs: [detect-changes, sync]
    if: |
      needs.detect-changes.outputs.config-server == 'true' ||
      github.event.inputs.service == 'config-server' ||
      github.event.inputs.service == 'all'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build and push image
        run: |
          mvn compile jib:build -pl infrastructure/config-server \
            -Djib.to.image=ghcr.io/yigitdemirko/marketplace/config-server:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GHCR_TOKEN }}
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull config-server
            docker compose up -d --no-deps --remove-orphans config-server
      - if: always()
        uses: ./.github/actions/notify-slack
        with:
          service: config-server
          status: ${{ job.status }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

