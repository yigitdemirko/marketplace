name: Deploy

on:
  push:
    branches: [main]

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      config-server: ${{ steps.changes.outputs.config-server }}
      discovery-server: ${{ steps.changes.outputs.discovery-server }}
      user-service: ${{ steps.changes.outputs.user-service }}
      product-service: ${{ steps.changes.outputs.product-service }}
      search-service: ${{ steps.changes.outputs.search-service }}
      order-service: ${{ steps.changes.outputs.order-service }}
      payment-service: ${{ steps.changes.outputs.payment-service }}
      notification-service: ${{ steps.changes.outputs.notification-service }}
      api-gateway: ${{ steps.changes.outputs.api-gateway }}
      frontend: ${{ steps.changes.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            config-server:
              - 'infrastructure/config-server/**'
            discovery-server:
              - 'infrastructure/discovery-server/**'
            user-service:
              - 'services/user-service/**'
            product-service:
              - 'services/product-service/**'
            search-service:
              - 'services/search-service/**'
            order-service:
              - 'services/order-service/**'
            payment-service:
              - 'services/payment-service/**'
            notification-service:
              - 'services/notification-service/**'
            api-gateway:
              - 'infrastructure/api-gateway/**'
            frontend:
              - 'frontend/**'

  deploy-config-server:
    needs: detect-changes
    if: needs.detect-changes.outputs.config-server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and push image
        run: |
          mvn compile jib:build -pl infrastructure/config-server --also-make \
            -Djib.to.image=ghcr.io/yigitdemirko/marketplace/config-server:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GHCR_TOKEN }}
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull config-server
            docker compose up -d --no-deps config-server

  deploy-discovery-server:
    needs: detect-changes
    if: needs.detect-changes.outputs.discovery-server == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and push image
        run: |
          mvn compile jib:build -pl infrastructure/discovery-server --also-make \
            -Djib.to.image=ghcr.io/yigitdemirko/marketplace/discovery-server:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GHCR_TOKEN }}
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull discovery-server
            docker compose up -d --no-deps discovery-server

  deploy-user-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.user-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and push image
        run: |
          mvn compile jib:build -pl services/user-service --also-make \
            -Djib.to.image=ghcr.io/yigitdemirko/marketplace/user-service:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GHCR_TOKEN }}
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull user-service
            docker compose up -d --no-deps user-service

  deploy-product-service:
    needs: detect-changes
    if: needs.detect-changes.outputs.product-service == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build and push image
        run: |
          mvn compile jib:build -pl services/product-service --also-make \
            -Djib.to.image=ghcr.io/yigitdemirko/marketplace/product-service:latest \
            -Djib.to.auth.username=${{ github.actor }} \
            -Djib.to.auth.password=${{ secrets.GHCR_TOKEN }}
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose pull product-service
            docker compose up -d --no-deps product-service

  deploy-search-service:
