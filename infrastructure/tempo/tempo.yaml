server:
  http_listen_port: 3200

distributor:
  receivers:
    zipkin:

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics

compactor:
  compaction:
    block_retention: 24h
